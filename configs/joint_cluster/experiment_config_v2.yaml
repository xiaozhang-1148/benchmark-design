# Joint clustering V2 — type-identity GT features, fixed K=4
# Reuses V1 image PCA / alignment; does not overwrite joint_cluster_v1

random_state: 42
k_main: 4

paths:
  v1_root: "/mnt/nvme_user/baoquan/Label_Data/benchmark-export/joint_cluster_v1"
  images_dir: "/mnt/nvme_user/baoquan/Label_Data/images_folder"
  output_root: "/mnt/nvme_user/baoquan/Label_Data/benchmark-export/joint_cluster_v2"
  mapping_yaml: "configs/joint_cluster/token_category_mapping.yaml"

prevalence:
  min_rate: 0.01
  max_rate: 0.99

fusion:
  f1_text_weight: 1.0
  f2_text_weight: 0.5

clustering:
  n_init: 50
  init: "k-means++"
  k_scan_min: 2
  k_scan_max: 8

galleries:
  center_n: 20
  outlier_n: 12

umap:
  n_neighbors: 15
  min_dist: 0.1
  metric: "euclidean"
