# Smoke / correctness run (10 images). Copy of default with limits.
seed: 42

model:
  name_or_path: "deepseek-ai/DeepSeek-OCR-2"
  local_path: "/mnt/nvme_model/.cache/huggingface/hub/models--deepseek-ai--DeepSeek-OCR-2/snapshots/aaa02f3811945a91062062994c5c4a3f4c0af2b0"
  revision: "aaa02f3811945a91062062994c5c4a3f4c0af2b0"
  trust_remote_code: true
  dtype: "bfloat16"
  visual_encoder: "qwen2_model"
  selected_layer: null
  attn_implementation: "eager"

data:
  input_dir: "/mnt/nvme_user/baoquan_datasets/EDA-Data-Folder/processed_2/benchmark"
  image_extensions: [".jpg", ".jpeg", ".png", ".webp", ".tif", ".tiff"]
  recursive: true

paths:
  output_root: "/mnt/nvme_user/baoquan_datasets/EDA-Data-Folder/processed_2/benchmark_export_1/deepseek"
  reports_dir: null
  project_reports_dir: "reports"

prompt: "<image>\n<|grounding|>Convert the document to markdown."

vllm:
  enabled: true
  dtype: "bfloat16"
  temperature: 0.0
  top_p: 1.0
  max_tokens: 2048
  max_model_len: 8192
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  max_num_seqs: 4
  enforce_eager: false
  trust_remote_code: true
  hf_overrides:
    architectures: ["DeepseekOCR2ForCausalLM"]
  ngram_size: 20
  ngram_window_size: 90
  ngram_whitelist_token_ids: [128821, 128822]
  enable_prefix_caching: false
  quantization: null
  retry_max: 3
  retry_backoff_sec: 2.0
  prefetch_workers: 4
  decode_workers: 4

visual:
  batch_size: 1
  crop_mode: true
  base_size: 1024
  image_size: 768
  device: "cuda"
  pool_causal_flow_only: true
  use_sam_middle_layer: false

recognition:
  extract_decoder_embedding: false

benchmark:
  enabled: true
  sample_size: 8
  max_num_seqs_candidates: [2, 4]
  gpu_memory_utilization_candidates: [0.80, 0.85]
  prefetch_workers_candidates: [4]
  skip_if_exists: false

analysis:
  knn_k: 15
  umap_n_neighbors: 15
  umap_min_dist: 0.1
  umap_max_samples: 30000
  contact_sheet_anchors: 4
  contact_sheet_neighbors: 5
  distance_matrix_sample_size: 50
  pca_n_components: 16
  figure_dpi: 150

pipeline:
  stages:
    - inspect_model
    - build_manifest
    - benchmark
    - vllm_ocr
    - parse_layout
    - parse_recognition
    - visual_features
    - analyze
    - plot
    - report
  resume: true
  limit: 10
