# DeepSeek-OCR2 mean-pooled projected-token embedding
# Method (P1): SAM → Qwen2 → Projector → global 256 tokens → mean → L2
# No OCR text generation, no GT, no layout parsing.
# Outputs: experiment_root/runs/{run_id}/ (independent per run)

method_name: "DeepSeek-OCR2 mean-pooled projected-token embedding"

model:
  name_or_path: "deepseek-ai/DeepSeek-OCR-2"
  local_path: "/mnt/nvme_model/.cache/huggingface/hub/models--deepseek-ai--DeepSeek-OCR-2/snapshots/aaa02f3811945a91062062994c5c4a3f4c0af2b0"
  revision: "aaa02f3811945a91062062994c5c4a3f4c0af2b0"
  dtype: "bfloat16"
  attn_implementation: "eager"

preprocess:
  base_size: 1024
  image_size: 768
  crop_mode: true

# P1: global-only 256 projected tokens (no local patches)
use_local_patches: false
pooling: "global_mean"
normalization: "l2"
exclude_view_separator: true
random_seed: 42

data:
  input_dir: "/mnt/nvme_user/baoquan_datasets/EDA-Data-Folder/processed_2/ALL-data/ALL_Benchmark"
  image_extensions: [".jpg", ".jpeg", ".png", ".webp", ".tif", ".tiff"]
  recursive: true

paths:
  experiment_root: "/mnt/nvme_user/baoquan_datasets/EDA-Data-Folder/processed_2/ALL-data/ALL_embedding"

extract:
  data_parallel_size: auto
  resume: true
  # batch by similar patch counts when possible; first version is per-image
  save_name: "deepseek_ocr2_mean_l2.npy"

stages:
  verify_n: 50
  smoke_n: 800
  determinism_n: 30

analysis:
  knn_k: 8
  umap_n_neighbors: 15
  umap_min_dist: 0.1
  umap_random_state: 42
  pca_n_components: 50
  figure_dpi: 150
  similarity_sample: 2000
  kmeans_k_min: 2
  kmeans_k_max: 20
  kmeans_n_init_seeds: 10
  kmeans_bootstrap: 5
  hdbscan_pca_dim: 50
  hdbscan_min_cluster_size_frac: 0.005
  hdbscan_min_cluster_size_floor: 20
  gallery_n: 16
  confound_rho_threshold: 0.5
