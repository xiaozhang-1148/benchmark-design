# DeepSeek-OCR-2 feature extraction & distribution analysis
# Runtime: prefer /home/baoquan/ocr-process/ocr-pipeline/.venv/bin/python (vLLM>=0.19 + OCR2)

seed: 42

model:
  name_or_path: "deepseek-ai/DeepSeek-OCR-2"
  # Local snapshot preferred when available
  local_path: "/mnt/nvme_model/.cache/huggingface/hub/models--deepseek-ai--DeepSeek-OCR-2/snapshots/aaa02f3811945a91062062994c5c4a3f4c0af2b0"
  revision: "aaa02f3811945a91062062994c5c4a3f4c0af2b0"
  trust_remote_code: true
  dtype: "bfloat16"
  # Visual encoder: qwen2_model (causal-flow). Layer index is 0-based into transformer layers.
  # Default = floor(num_layers / 2); overridden after introspection if null.
  visual_encoder: "qwen2_model"
  selected_layer: null
  # Language backbone: eager (remote DeepseekOCR2 does not declare SDPA support).
  # Qwen2 visual encoder still uses its own SDPA path internally.
  attn_implementation: "eager"

data:
  input_dir: "/mnt/nvme_user/baoquan_datasets/EDA-Data-Folder/processed_2/benchmark"
  image_extensions: [".jpg", ".jpeg", ".png", ".webp", ".tif", ".tiff"]
  recursive: true

paths:
  output_root: "/mnt/nvme_user/baoquan_datasets/EDA-Data-Folder/processed_2/benchmark_export_1/deepseek"
  reports_dir: null  # default: {output_root}/reports
  # Local project reports symlink/copy target for repo-relative reports/
  project_reports_dir: "reports"

prompt: "<image>\n<|grounding|>Convert the document to markdown."

vllm:
  enabled: true
  dtype: "bfloat16"
  temperature: 0.0
  top_p: 1.0
  max_tokens: 4096
  max_model_len: 8192
  tensor_parallel_size: null  # null = auto (1 if single-GPU run)
  gpu_memory_utilization: 0.90
  max_num_seqs: null  # null = auto via benchmark
  enforce_eager: false
  trust_remote_code: true
  hf_overrides:
    architectures: ["DeepseekOCR2ForCausalLM"]
  # Optional ngram logits processor (DeepSeek official recipe)
  ngram_size: 20
  ngram_window_size: 90
  ngram_whitelist_token_ids: [128821, 128822]
  enable_prefix_caching: false
  quantization: null
  retry_max: 3
  retry_backoff_sec: 2.0
  request_timeout_sec: 600
  # Async image IO
  prefetch_workers: 8
  decode_workers: 8

visual:
  # Channel B: Transformers BF16 extraction only (no long generation)
  batch_size: 1
  crop_mode: true
  base_size: 1024
  image_size: 768
  device: "cuda"
  # Pool only causal-flow query tokens from selected qwen2 layer
  pool_causal_flow_only: true
  # If true, also average SAM global-view features at middle SAM layer (not default)
  use_sam_middle_layer: false

recognition:
  extract_decoder_embedding: false

benchmark:
  enabled: true
  sample_size: 100
  max_num_seqs_candidates: [4, 8, 16, 32]
  gpu_memory_utilization_candidates: [0.75, 0.85, 0.90]
  prefetch_workers_candidates: [4, 8]
  skip_if_exists: true

analysis:
  knn_k: 15
  umap_n_neighbors: 30
  umap_min_dist: 0.1
  umap_max_samples: 30000
  contact_sheet_anchors: 8
  contact_sheet_neighbors: 5
  distance_matrix_sample_size: 500
  pca_n_components: 64
  figure_dpi: 200

pipeline:
  stages:
    - inspect_model
    - build_manifest
    - benchmark
    - vllm_ocr
    - parse_layout
    - parse_recognition
    - visual_features
    - analyze
    - plot
    - report
  resume: true
  limit: null  # set e.g. 10 for smoke tests
