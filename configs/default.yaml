# DeepSeek-OCR-2 visual embedding extraction & distribution analysis
# Env: uv sync --extra deepseek --extra analysis
# Visual-only: no vLLM OCR text, no grounding layout, no OCR quality channel.

seed: 42

model:
  name_or_path: "deepseek-ai/DeepSeek-OCR-2"
  local_path: "/mnt/nvme_model/baoquan/.cache/huggingface/hub/models--deepseek-ai--DeepSeek-OCR-2/snapshots/aaa02f3811945a91062062994c5c4a3f4c0af2b0"
  revision: "aaa02f3811945a91062062994c5c4a3f4c0af2b0"
  trust_remote_code: true
  dtype: "bfloat16"
  visual_encoder: "qwen2_model"
  selected_layer: null
  attn_implementation: "eager"

data:
  input_dir: "/mnt/nvme_user/baoquan/Label_Data/images_folder"
  image_extensions: [".jpg", ".jpeg", ".png", ".webp", ".tif", ".tiff"]
  recursive: true

paths:
  output_root: "/home/baoquan/benchmark/deepseek"
  reports_dir: null  # default: {output_root}/reports
  reports_v2_dir: null  # default: {output_root}/reports_v2

visual:
  batch_size: 1
  crop_mode: true
  base_size: 1024
  image_size: 768
  device: "cuda"
  pool_causal_flow_only: true
  use_sam_middle_layer: false
  data_parallel_size: auto

embedding_quality:
  norm_min: 1.0e-6
  norm_max: 1.0e6

analysis:
  knn_k: 15
  umap_n_neighbors: 30
  umap_min_dist: 0.1
  umap_max_samples: 30000
  contact_sheet_anchors: 8
  contact_sheet_neighbors: 5
  distance_matrix_sample_size: 500
  pca_n_components: 64
  figure_dpi: 200

pipeline:
  stages:
    - inspect_model
    - build_manifest
    - visual_features
    - embedding_quality
    - analysis_v2
  resume: true
  limit: null
